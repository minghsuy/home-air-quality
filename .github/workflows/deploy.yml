# Builds the MkDocs site and publishes it to GitHub Pages.
name: Deploy guide to GitHub Pages

# WHEN this runs:
on:
  push:
    branches: [main]        # merges to main → build AND publish
  pull_request:             # PRs → build only (catch breakage before it merges)
  workflow_dispatch:        # + a manual "Run workflow" button

# WHAT it may do (least privilege — only what Pages needs):
permissions:
  contents: read
  pages: write              # (only the deploy job actually uses these two)
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build the static site. Runs on BOTH pushes and PRs, so a PR that breaks the
  # build (or an internal link, via --strict) fails its checks before you merge.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "mkdocs-material>=9,<10"
      - run: mkdocs build --strict          # renders docs/ into ./site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  # Publish to Pages — only on a real push to main, never from a PR.
  deploy:
    needs: build
    if: github.event_name != 'pull_request'   # the conditional that skips PR deploys
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
